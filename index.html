<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbsenKu - Login Guru</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* style sama seperti sebelumnya */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width:100%; max-width:400px; }
        .card {
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .logo { text-align:center; margin-bottom:32px; }
        .logo-icon {
            width:64px; height:64px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius:20px;
            display:flex; align-items:center; justify-content:center;
            margin:0 auto 16px;
        }
        .logo-icon i { font-size:32px; color:white; }
        h1 { font-size:24px; font-weight:700; color:#1a1a2e; text-align:center; }
        .subtitle { text-align:center; color:#666; font-size:14px; margin-top:8px; }
        .tab-buttons {
            display:flex; gap:12px; margin:24px 0;
            background:#f1f5f9; border-radius:16px; padding:4px;
        }
        .tab-btn {
            flex:1; padding:12px; border:none; background:transparent;
            font-size:14px; font-weight:600; border-radius:12px; cursor:pointer;
            color:#64748b; transition:all 0.3s;
        }
        .tab-btn.active { background:white; color:#667eea; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
        .form-group { margin-bottom:20px; }
        label { display:block; font-size:13px; font-weight:600; color:#334155; margin-bottom:8px; }
        .input-group {
            display:flex; align-items:center; border:1px solid #e2e8f0;
            border-radius:16px; padding:12px 16px; transition:all 0.3s;
        }
        .input-group:focus-within { border-color:#667eea; box-shadow:0 0 0 3px rgba(102,126,234,0.1); }
        .input-group i { color:#94a3b8; margin-right:12px; font-size:18px; }
        input { flex:1; border:none; outline:none; font-size:15px; font-family:'Inter',sans-serif; }
        .btn {
            width:100%; padding:14px; border:none; border-radius:16px;
            font-size:16px; font-weight:600; cursor:pointer; transition:all 0.3s;
        }
        .btn-primary { background:linear-gradient(135deg, #667eea, #764ba2); color:white; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(102,126,234,0.3); }
        .message { margin-top:16px; padding:12px; border-radius:12px; font-size:13px; text-align:center; display:none; }
        .message.error { background:#fee2e2; color:#dc2626; display:block; }
        .message.success { background:#dcfce7; color:#16a34a; display:block; }
        .package-info { background:#f8fafc; border-radius:16px; padding:16px; margin:20px 0; }
        .package-title { font-weight:700; font-size:14px; margin-bottom:12px; color:#1e293b; }
        .package-options { display:flex; gap:8px; flex-wrap:wrap; }
        .package-option {
            flex:1; padding:8px; border:1px solid #e2e8f0; border-radius:12px;
            text-align:center; cursor:pointer; transition:all 0.2s;
        }
        .package-option.selected { border-color:#667eea; background:#f0f4ff; }
        .package-price { font-weight:700; color:#667eea; }
        .package-desc { font-size:10px; color:#64748b; }
        .hidden { display:none; }
        .wa-link {
            display:inline-block; background:#25D366; color:white; padding:12px 20px;
            border-radius:16px; text-decoration:none; font-weight:600; font-size:14px;
            margin-top:16px; text-align:center; width:100%;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-qrcode"></i></div>
            <h1>AbsenKu</h1>
            <p class="subtitle">Sistem Absensi Siswa dengan QR Code</p>
        </div>
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('register')">Daftar</button>
        </div>
        <!-- Login -->
        <div id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="guru@email.com"></div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="********"></div>
            </div>
            <button class="btn btn-primary" onclick="handleLogin()">Login</button>
        </div>
        <!-- Register -->
        <div id="registerForm" class="hidden">
            <div class="form-group"><label>Nama Lengkap</label><div class="input-group"><i class="fas fa-user"></i><input type="text" id="regName"></div></div>
            <div class="form-group"><label>Email</label><div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="regEmail"></div></div>
            <div class="form-group"><label>Password</label><div class="input-group"><i class="fas fa-lock"></i><input type="password" id="regPassword"></div></div>
            <div class="form-group"><label>Nomor WhatsApp</label><div class="input-group"><i class="fab fa-whatsapp"></i><input type="tel" id="regWhatsapp" placeholder="6281234567890"></div></div>
            <div class="package-info">
                <div class="package-title">Pilih Paket</div>
                <div class="package-options">
                    <div class="package-option" data-price="10000" data-duration="bulan" onclick="selectPackage(this)"><div class="package-price">Rp 10.000</div><div class="package-desc">1 Bulan</div></div>
                    <div class="package-option" data-price="50000" data-duration="semester" onclick="selectPackage(this)"><div class="package-price">Rp 50.000</div><div class="package-desc">1 Semester</div></div>
                    <div class="package-option" data-price="90000" data-duration="tahun" onclick="selectPackage(this)"><div class="package-price">Rp 90.000</div><div class="package-desc">1 Tahun</div></div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="handleRegister()">Daftar & Kirim ke Admin</button>
        </div>
        <div id="message" class="message"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzVDA3Yhmne_ppKXNdTG4f_nkrITglnZL-OFStW5AjWjeUHQ_Tq9Qgk13JnrACL2yNiVQ/exec'; // GANTI DENGAN URL DEPLOY ANDA
    let selectedPackage = { price: 10000, duration: 'bulan' };

    function showMessage(msg, type) {
        const div = document.getElementById('message');
        div.textContent = msg;
        div.className = `message ${type}`;
        setTimeout(() => div.style.display = 'none', 5000);
    }

    function switchTab(tab) {
        const login = document.getElementById('loginForm');
        const reg = document.getElementById('registerForm');
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(btn => btn.classList.remove('active'));
        if (tab === 'login') {
            login.classList.remove('hidden');
            reg.classList.add('hidden');
            btns[0].classList.add('active');
        } else {
            login.classList.add('hidden');
            reg.classList.remove('hidden');
            btns[1].classList.add('active');
        }
        document.getElementById('message').className = 'message';
    }

    function selectPackage(el) {
        document.querySelectorAll('.package-option').forEach(opt => opt.classList.remove('selected'));
        el.classList.add('selected');
        selectedPackage = { price: parseInt(el.dataset.price), duration: el.dataset.duration };
    }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) return showMessage('Isi semua field', 'error');
        const btn = event.target;
        btn.disabled = true; btn.textContent = 'Loading...';
        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'login', email, password })
            });
            const json = await res.json();
            if (json.success) {
                localStorage.setItem('guruData', JSON.stringify(json.data));
                window.location.href = 'guru-dashboard.html';
            } else {
                showMessage(json.message, 'error');
            }
        } catch (err) { showMessage('Gagal koneksi', 'error'); }
        finally { btn.disabled = false; btn.textContent = 'Login'; }
    }

    async function handleRegister() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const whatsapp = document.getElementById('regWhatsapp').value;
        if (!name || !email || !password || !whatsapp) return showMessage('Semua field harus diisi', 'error');
        if (password.length < 6) return showMessage('Password min 6 karakter', 'error');
        const btn = event.target;
        btn.disabled = true; btn.textContent = 'Mendaftar...';
        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'register',
                    name, email, password, whatsapp,
                    paket: selectedPackage.duration,
                    harga: selectedPackage.price
                })
            });
            const json = await res.json();
            if (json.success) {
                showMessage('Pendaftaran berhasil! Silakan hubungi admin untuk aktivasi.', 'success');
                const waMsg = `Halo Admin, saya ${name} ingin order WebApp Absensi dengan paket ${selectedPackage.duration}, harga Rp ${selectedPackage.price.toLocaleString()}. Email: ${email}`;
                const waLink = document.createElement('a');
                waLink.href = `https://wa.me/6289609745090?text=${encodeURIComponent(waMsg)}`;
                waLink.target = '_blank';
                waLink.className = 'wa-link';
                waLink.innerHTML = '<i class="fab fa-whatsapp"></i> Kirim Bukti Pembayaran ke Admin';
                document.getElementById('registerForm').appendChild(waLink);
            } else {
                showMessage(json.message, 'error');
            }
        } catch (err) { showMessage('Gagal koneksi', 'error'); }
        finally { btn.disabled = false; btn.textContent = 'Daftar & Kirim ke Admin'; }
    }

    document.querySelector('.package-option').classList.add('selected');
</script>
</body>
</html>
